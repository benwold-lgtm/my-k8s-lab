apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfyui
  namespace: comfyui
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: comfyui
  template:
    metadata:
      labels:
        app: comfyui
    spec:
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "sku"
          operator: "Equal"
          value: "gpu"
          effect: "NoSchedule"
      containers:
      - name: comfyui
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http
        resources: {{ toYaml .Values.resources | nindent 10 }}
        env:
        - name: COMFYUI_FLAGS
          value: {{ .Values.environment.COMFYUI_FLAGS | quote }}
        - name: CF_QUICK_TUNNELS
          value: {{ .Values.environment.CF_QUICK_TUNNELS | quote }}
        volumeMounts:
        - name: models
          mountPath: {{ .Values.persistence.mountPath }}
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.service.port }}
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.service.port }}
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 10
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: {{ .Values.persistence.pvcName }}
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi
