image:
  repository: ghcr.io/benwold-lgtm/embedding
  tag: latest
  pullPolicy: Always

replicaCount: 1
revisionHistoryLimit: 3

service:
  type: NodePort
  port: 8001
  nodePort: 30082

model:
  name: "nomic-ai/nomic-embed-text-v1.5"

resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "6Gi"
    cpu: "2000m"
nodeSelector:
  kubernetes.io/hostname: bengpu1