apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: qdrant
spec:
  type: {{ .Values.service.type }}
  selector:
    app: qdrant
  ports:
    - name: rest
      port: {{ .Values.service.port }}
      targetPort: 6333
      nodePort: {{ .Values.service.nodePort }}
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: 6334
      nodePort: {{ .Values.service.grpcNodePort }}