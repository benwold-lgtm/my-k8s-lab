apiVersion: v1
kind: Service
metadata:
  name: vllm-server
  namespace: ai-stack
spec:
  type: {{ .Values.service.type }}
  selector:
    app: vllm
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}