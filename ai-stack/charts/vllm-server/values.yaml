replicaCount: 1

image:
  repository: vllm/vllm-openai
  tag: latest 
  pullPolicy: Always

model:
  name: "mistralai/Mistral-Nemo-Instruct-FP8-2407" # Corrected to FP8 to match your working load
  downloadDir: "/data"

resources:
  limits:
    cpu: "8"
    memory: "32Gi"
    nvidia.com/gpu: 1
  requests:
    cpu: "4"
    memory: "16Gi"
    nvidia.com/gpu: 1

# CORRECTION: hostname is the specific key for a single node
nodeSelector:
  kubernetes.io/hostname: bengpu1 

# CORRECTION: Fixed the syntax error (was node=role, should be node-role)
gpuNodeSelector:
  node-role.kubernetes.io/gpunode: "true"

service:
  type: NodePort
  port: 8000
  nodePort: 30000

persistence:
  pvcName: vllm-models-nfs-pvc