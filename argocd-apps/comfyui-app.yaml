apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: comfyui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/benwold-lgtm/MY-K8S-LAB'
    targetRevision: HEAD
    path: ai-stack/charts/comfyui
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: comfyui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
