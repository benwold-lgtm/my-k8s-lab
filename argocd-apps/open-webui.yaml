apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-webui
  namespace: argocd
spec:
  project: default
  source:
    chart: open-webui
    repoURL: https://helm.openwebui.com/
    targetRevision: '*'
    helm:
      values: |
        replicaCount: 1
        
        # Connection to your vLLM server on bengpu1
        extraEnvVars:
          - name: OPENAI_API_BASE_URL
            value: "http://192.168.1.112:30000/v1"
          - name: OPENAI_API_KEY
            value: "not-needed"
          - name: ENABLE_OLLAMA_API
            value: "false"

        # Using your existing local-path-storage
        persistence:
          enabled: true
          existingClaim: ""
          storageClass: "manual"
          size: 10Gi
          accessMode: ReadWriteMany 

        service:
          type: NodePort
          port: 8080
          nodePort: 30080
  
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-stack
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true