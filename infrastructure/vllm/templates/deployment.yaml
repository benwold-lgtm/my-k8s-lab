apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        kubernetes.io/hostname: bengpu1
      containers:
        - name: vllm-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "{{ .Values.model.name }}"
            - "--quantization"
            - "awq" # OR "squeezellm" / "fp8" if available for this model
            - "--gpu-memory-utilization"
            - "0.90"
            - "--max-model-len"
            - "8192"
            - "{{ .Values.model.name }}"
            - "--download-dir"
            - "{{ .Values.model.downloadDir }}"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: token
            - name: VLLM_ENABLE_CUDA_COMPATIBILITY
              value: "0"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: model-data
              mountPath: /data
            - name: shm 
              mountPath: /dev/shm
          resources:
            limits:
              cpu: "8"
              memory: "32Gi"  
              nvidia.com/gpu: 1
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: 1
      volumes:
        - name: model-data
          persistentVolumeClaim:
            claimName: vllm-models-pvc  # This points to your PVC file
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi