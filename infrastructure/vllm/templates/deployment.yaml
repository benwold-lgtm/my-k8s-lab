apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "{{ .Values.model.name }}"
            - "--download-dir"
            - "{{ .Values.model.downloadDir }}"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: model-data
              mountPath: /data
            - name: shm # Required for vLLM performance
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: 1
      volumes:
        - name: model-data
          persistentVolumeClaim:
            claimName: vllm-models-pvc
        - name: shm
          emptyDir:
            medium: Memory