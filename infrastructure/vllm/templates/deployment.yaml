apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        kubernetes.io/hostname: bengpu1
      containers:
        - name: vllm-container
          image: "vllm/vllm-openai:v0.19.0" # Use the explicit version for Gemma 4
          args:
            - "--model"
            - "google/gemma-4-26b-a4b-it"
            - "--quantization"
            - "awq"                    # REDUCES VRAM FROM 60GB TO 15GB
            - "--download-dir"
            - "/data"                  # USES HOST PATH FOR MODEL STORAGE
            - "--gpu-memory-utilization"
            - "0.85"                   # LEAVES ROOM FOR THE SYSTEM
            - "--max-model-len"
            - "4096"                   # SMALLER CONTEXT = FASTER BOOT
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: token
            - name: VLLM_ENABLE_CUDA_COMPATIBILITY
              value: "0"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: model-data
              mountPath: /data
            - name: shm 
              mountPath: /dev/shm
          resources:
            limits:
              cpu: "8"
              memory: "32Gi"  
              nvidia.com/gpu: 1
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: 1
      volumes:
        - name: model-data
          hostPath:
          path: /mnt/k8s_pv/vllm-models  # This should match the path in your PVC file
          type: Directory
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi