apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-master-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/benwold-lgtm/MY-K8S-LAB'
    targetRevision: HEAD
    path: argocd-apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
